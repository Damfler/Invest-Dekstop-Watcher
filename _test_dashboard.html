<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T-Bank Invest</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #1a1a2e;
  --bg2:     #16213e;
  --surface: #1e2748;
  --border:  #2a3a5c;
  --text:    #eaf0f6;
  --muted:   #8896b3;
  --green:   #00c853;
  --red:     #ff5252;
  --amber:   #ffab00;
  --yellow:  #ffdd00;
  --blue:    #448aff;
  --purple:  #7c4dff;
  --teal:    #1de9b6;
  --radius:  12px;
  --font:    -apple-system, "Segoe UI", sans-serif;
}
/* ── Light theme ── */
body.light {
  --bg:      #f5f6fa;
  --bg2:     #ffffff;
  --surface: #ffffff;
  --border:  #e0e4ed;
  --text:    #1a1a2e;
  --muted:   #6b7280;
  --green:   #16a34a;
  --red:     #dc2626;
  --amber:   #d97706;
  --yellow:  #ca8a04;
  --blue:    #2563eb;
  --purple:  #7c3aed;
  --teal:    #0d9488;
}
body.light .header { background: linear-gradient(135deg, #fff, #f5f6fa); }
body.light .logo { color: #1a1a2e; }
body.light .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
body.light .alloc-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
body.light .card { box-shadow: 0 1px 3px rgba(0,0,0,.08); }
body.light .account-row { box-shadow: 0 1px 2px rgba(0,0,0,.05); }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; transition: background .2s, color .2s; }
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: linear-gradient(135deg, var(--bg2), var(--bg));
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo { font-size: 17px; font-weight: 700; color: var(--yellow); }
.last-update { font-size: 11px; color: var(--muted); }
.header-right { display: flex; gap: 8px; }
.btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  padding: 5px 12px; font-size: 12px; cursor: pointer;
}
.btn:hover { background: var(--border); }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 0; background: var(--bg2);
  border-bottom: 2px solid var(--border); flex-shrink: 0;
}
.tab {
  padding: 10px 22px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all .15s;
  user-select: none;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,.03); }
.tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }

/* ── Content ── */
.tab-content { display: none; flex: 1; overflow-y: auto; padding: 16px 20px; }
.tab-content.active { display: block; }

/* ── Cards ── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.card-value { font-size: 20px; font-weight: 700; }
.card-sub { font-size: 12px; margin-top: 2px; }
.up { color: var(--green); }
.dn { color: var(--red); }

/* ── Alert ── */
.alert {
  padding: 10px 16px; border-radius: var(--radius); margin-bottom: 16px;
  font-weight: 600; font-size: 13px;
}
.alert-crit { background: rgba(255,82,82,.15); border: 1px solid var(--red); color: var(--red); }
.alert-warn { background: rgba(255,171,0,.12); border: 1px solid var(--amber); color: var(--amber); }

/* ── Accounts list ── */
.account-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 8px; margin-bottom: 6px;
  background: var(--surface); border: 1px solid var(--border); cursor: pointer;
}
.account-row:hover { background: var(--border); }
.acc-name { font-weight: 600; font-size: 13px; }
.acc-total { font-size: 14px; font-weight: 700; }
.acc-delta { font-size: 12px; }

/* ── Charts ── */
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.chart-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--muted); }
.chart-container { position: relative; height: 260px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

/* ── Allocation toggle ── */
.alloc-controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.alloc-btn {
  padding: 4px 12px; border-radius: 16px; font-size: 11px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border); color: var(--muted);
}
.alloc-btn.active { background: var(--yellow); color: #000; border-color: var(--yellow); font-weight: 600; }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
td { padding: 8px 10px; border-bottom: 1px solid rgba(42,58,92,.5); }
tr:hover td { background: rgba(255,255,255,.02); }
.clickable { cursor: pointer; }
.clickable:hover { color: var(--blue); }

/* ── Event pills ── */
.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin: 1px 2px; }
.pill-coupon { background: rgba(68,138,255,.15); color: var(--blue); }
.pill-offer { background: rgba(255,171,0,.15); color: var(--amber); }
.pill-maturity { background: rgba(124,77,255,.15); color: var(--purple); }
.pill-today { background: rgba(255,82,82,.2); color: var(--red); font-weight: 700; }

/* ── Section ── */
.section-title { font-size: 14px; font-weight: 600; margin: 16px 0 10px; color: var(--text); }
.empty { text-align: center; padding: 40px; color: var(--muted); }
.filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">T-Bank Invest</span>
      <span class="last-update" id="lastUpdate"></span>
    </div>
    <div class="header-right">
      <button class="btn" id="btnMode">Za segodnya</button>
      <button class="btn" id="btnTheme" title="Тема">&#x1f319;</button>
      <button class="btn" onclick="pywebview.api.refresh()">&#x1f504;</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="portfolio">Портфель</div>
    <div class="tab" data-tab="positions">Позиции</div>
    <div class="tab" data-tab="bonds">Облигации</div>
    <div class="tab" data-tab="analytics">Аналитика</div>
  </div>

  <!-- TAB: Portfolio -->
  <div class="tab-content active" id="tab-portfolio">
    <div id="alertBanner"></div>
    <div class="cards" id="statCards"></div>
    <div id="accountsList"></div>
    <div class="chart-row">
      <div class="chart-wrap">
        <div class="chart-title">Аллокация по типам</div>
        <div class="alloc-controls" id="allocControls"></div>
        <div class="chart-container"><canvas id="allocChart"></canvas></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Купонный поток (12 мес.)</div>
        <div class="chart-container"><canvas id="couponChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- TAB: Positions -->
  <div class="tab-content" id="tab-positions">
    <div class="filter-row" id="posFilters"></div>
    <table id="posTable">
      <thead><tr>
        <th>Название</th><th>Тип</th><th>Кол-во</th><th>Цена</th><th>Стоимость</th><th>P&L</th><th>Доля</th>
      </tr></thead>
      <tbody id="posBody"></tbody>
    </table>
  </div>

  <!-- TAB: Bonds -->
  <div class="tab-content" id="tab-bonds">
    <table id="bondTable">
      <thead><tr>
        <th>Название</th><th>ISIN</th><th>Тип</th><th>Дата</th><th>Сумма</th>
      </tr></thead>
      <tbody id="bondBody"></tbody>
    </table>
  </div>

  <!-- TAB: Analytics -->
  <div class="tab-content" id="tab-analytics">
    <div class="cards" id="analyticsCards"></div>
    <div class="section-title">Лучшие / худшие за день</div>
    <div id="moversBlock"></div>
  </div>

</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtMoney(v, d=0) {
  if (v == null) return '—';
  return v.toLocaleString('ru-RU', { minimumFractionDigits: d, maximumFractionDigits: d }) + ' \u20bd';
}
function fmtPct(v) { return v != null ? v.toFixed(1) + '%' : '—'; }
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function daysUntil(s) {
  if (!s) return null;
  const d = new Date(s);
  const now = new Date();
  const eventDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const today     = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((eventDate - today) / 86400000);
}
function daysLabel(n) {
  if (n == null) return '';
  if (n === 0) return 'сегодня';
  if (n === 1) return 'завтра';
  if (n < 0) return 'прошло';
  return 'через ' + n + ' дн.';
}
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

const TYPE_MAP = { bond:'Облигации', share:'Акции', etf:'Фонды', currency:'Валюта', futures:'Фьючерсы', sp:'СП', option:'Опционы' };
const TYPE_LABEL = { coupon:'Купон', offer:'Оферта', call:'Call', maturity:'Погашение' };
const PIE_COLORS = ['#448aff','#ffdd00','#00c853','#ff5252','#7c4dff','#1de9b6','#ffab00','#ff6e40'];

let allocChart = null, couponChart = null;
let currentData = null;
let allocMode = 'types'; // 'types' | 'positions'

// ── Theme ────────────────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('tbank_theme');
  if (saved === 'light') document.body.classList.add('light');
  updateThemeBtn();
}
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  localStorage.setItem('tbank_theme', isLight ? 'light' : 'dark');
  updateThemeBtn();
  // Redraw charts with new colors
  if (currentData) {
    renderAllocation(currentData.positions_extra || []);
    renderCouponChart(currentData.bond_events || []);
  }
}
function updateThemeBtn() {
  const btn = document.getElementById('btnTheme');
  if (btn) btn.textContent = document.body.classList.contains('light') ? '\u2600\uFE0F' : '\uD83C\uDF19';
}
initTheme();
document.getElementById('btnTheme').onclick = toggleTheme;

// ── Tabs ─────────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
});

// ── Render ───────────────────────────────────────────────────────────────────
function render(data) {
  currentData = data;
  const mode = data.show_mode || 'day';
  const portfolios = data.portfolios || [];
  const events = data.bond_events || [];
  const posExtra = data.positions_extra || [];
  const bondNkd = data.bond_nkd || {};
  const bondAn = data.bond_analytics || [];

  // Header
  document.getElementById('lastUpdate').textContent = data.last_update || '';
  const modeBtn = document.getElementById('btnMode');
  modeBtn.textContent = mode === 'day' ? 'За сегодня' : 'За всё время';
  modeBtn.onclick = () => pywebview.api.refresh(); // mode toggle is in tray menu

  // Alert
  const alertEl = document.getElementById('alertBanner');
  if (data.alert_level === 2) {
    alertEl.innerHTML = '<div class="alert alert-crit">ОФЕРТА СЕГОДНЯ! Требует решения!</div>';
  } else if (data.alert_level === 1) {
    alertEl.innerHTML = '<div class="alert alert-warn">Скоро оферта — проверьте облигации</div>';
  } else {
    alertEl.innerHTML = '';
  }

  // Stat cards
  const totalAll = portfolios.reduce((s,p) => s + p.total, 0);
  const deltaAll = portfolios.reduce((s,p) => s + (mode==='day' ? p.day_delta : p.alltime_delta), 0);
  const totalNkd = Object.values(bondNkd).reduce((s,v) => s + (v.nkd_total||0), 0);

  let ytm = null;
  let wSum = 0, wYtm = 0;
  for (const b of bondAn) {
    if (!b.maturity_date || !b.face_value) continue;
    const years = (new Date(b.maturity_date) - Date.now()) / (365.25*86400000);
    if (years <= 0) continue;
    const y = (b.annual_coupon + (b.face_value - b.current_price)/years) / ((b.face_value + b.current_price)/2) * 100;
    const w = b.qty * b.current_price;
    wSum += w; wYtm += y * w;
  }
  if (wSum > 0) ytm = wYtm / wSum;

  const modeStr = mode === 'day' ? 'сегодня' : 'за всё время';
  document.getElementById('statCards').innerHTML = `
    <div class="card">
      <div class="card-label">Портфель</div>
      <div class="card-value">${fmtMoney(totalAll)}</div>
    </div>
    <div class="card">
      <div class="card-label">${esc(modeStr)}</div>
      <div class="card-value ${deltaAll >= 0 ? 'up' : 'dn'}">${(deltaAll>=0?'+':'') + fmtMoney(deltaAll)}</div>
    </div>
    <div class="card">
      <div class="card-label">НКД накоплено</div>
      <div class="card-value">${totalNkd > 0 ? fmtMoney(totalNkd, 2) : '—'}</div>
    </div>
    <div class="card">
      <div class="card-label">Средний YTM</div>
      <div class="card-value">${ytm != null ? ytm.toFixed(2) + '%' : '—'}</div>
    </div>
  `;

  // Accounts
  let accHtml = '';
  for (const p of portfolios) {
    const d = mode==='day' ? p.day_delta : p.alltime_delta;
    const cls = d >= 0 ? 'up' : 'dn';
    const sign = d >= 0 ? '+' : '';
    accHtml += `<div class="account-row" onclick="pywebview.api.open_url('https://www.tbank.ru/invest/portfolio/')">
      <div><span class="acc-name">${esc(p.name)}</span></div>
      <div><span class="acc-total">${fmtMoney(p.total)}</span> <span class="acc-delta ${cls}">${sign}${fmtMoney(d)}</span></div>
    </div>`;
  }
  document.getElementById('accountsList').innerHTML = accHtml;

  // Allocation
  renderAllocation(posExtra);

  // Coupon flow
  renderCouponChart(events);

  // Positions tab
  renderPositions(posExtra, totalAll, mode);

  // Bonds tab
  renderBonds(events, bondNkd);

  // Analytics tab
  renderAnalytics(posExtra, ytm, totalNkd, bondAn);
}

// ── Allocation doughnut ─────────────────────────────────────────────────────
function renderAllocation(positions) {
  const controls = document.getElementById('allocControls');
  controls.innerHTML = `
    <div class="alloc-btn ${allocMode==='types'?'active':''}" onclick="setAllocMode('types')">По типам</div>
    <div class="alloc-btn ${allocMode==='positions'?'active':''}" onclick="setAllocMode('positions')">По позициям</div>
  `;

  let labels = [], values = [], colors = [];
  if (allocMode === 'types') {
    const totals = {};
    for (const p of positions) {
      const lbl = TYPE_MAP[p.instrumentType] || p.instrumentType || '?';
      totals[lbl] = (totals[lbl]||0) + (p.current_value||0);
    }
    const entries = Object.entries(totals).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
    labels = entries.map(e => e[0]);
    values = entries.map(e => e[1]);
  } else {
    const sorted = [...positions].filter(p => (p.current_value||0) > 0).sort((a,b) => (b.current_value||0) - (a.current_value||0));
    labels = sorted.map(p => p.name || p.isin || '?');
    values = sorted.map(p => p.current_value||0);
  }
  colors = values.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]);

  const ctx = document.getElementById('allocChart');
  if (allocChart) allocChart.destroy();
  allocChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: { position: 'right', labels: { color: getComputedStyle(document.body).getPropertyValue('--muted').trim(), font: { size: 11 }, padding: 8, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((s,v) => s+v, 0);
              const pct = total > 0 ? (ctx.parsed / total * 100).toFixed(1) : 0;
              return ctx.label + ': ' + fmtMoney(ctx.parsed) + ' (' + pct + '%)';
            }
          }
        }
      }
    }
  });
}

window.setAllocMode = function(m) { allocMode = m; if (currentData) renderAllocation(currentData.positions_extra || []); };

// ── Coupon bar chart ────────────────────────────────────────────────────────
function renderCouponChart(events) {
  const coupons = events.filter(e => e.type === 'coupon');
  const months = {};
  for (const e of coupons) {
    if (!e.date) continue;
    const d = new Date(e.date);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const lbl = d.toLocaleDateString('ru-RU', { month: 'short', year: '2-digit' });
    if (!months[key]) months[key] = { label: lbl, sum: 0 };
    const amt = e.amount || e.amount_est || 0;
    months[key].sum += amt * (e.qty || 1);
  }
  const sorted = Object.entries(months).sort((a,b) => a[0].localeCompare(b[0]));
  const labels = sorted.map(e => e[1].label);
  const data = sorted.map(e => e[1].sum);
  const maxVal = Math.max(...data, 0);

  const ctx = document.getElementById('couponChart');
  if (couponChart) couponChart.destroy();
  couponChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map(v => v === maxVal && maxVal > 0 ? 'rgba(255,221,0,.8)' : 'rgba(68,138,255,.6)'),
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmtMoney(ctx.parsed.y, 2) } } },
      scales: {
        x: { ticks: { color: getComputedStyle(document.body).getPropertyValue('--muted').trim(), font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: getComputedStyle(document.body).getPropertyValue('--muted').trim(), callback: v => fmtMoney(v) }, grid: { color: 'rgba(42,58,92,.4)' } }
      }
    }
  });
}

// ── Positions tab ───────────────────────────────────────────────────────────
function renderPositions(positions, totalAll, mode) {
  // Filters
  const types = [...new Set(positions.map(p => p.instrumentType))].sort();
  let filterHtml = '<div class="alloc-btn active" data-type="all">Все</div>';
  for (const t of types) {
    filterHtml += `<div class="alloc-btn" data-type="${t}">${TYPE_MAP[t]||t}</div>`;
  }
  const filtersEl = document.getElementById('posFilters');
  filtersEl.innerHTML = filterHtml;
  filtersEl.onclick = e => {
    const btn = e.target.closest('.alloc-btn');
    if (!btn) return;
    filtersEl.querySelectorAll('.alloc-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fillPosTable(positions, totalAll, btn.dataset.type);
  };
  fillPosTable(positions, totalAll, 'all');
}

function fillPosTable(positions, totalAll, typeFilter) {
  const filtered = typeFilter === 'all' ? positions : positions.filter(p => p.instrumentType === typeFilter);
  const sorted = [...filtered].sort((a,b) => (b.current_value||0) - (a.current_value||0));
  let html = '';
  for (const p of sorted) {
    const d = p.day_delta || 0;
    const cls = d >= 0 ? 'up' : 'dn';
    const sign = d >= 0 ? '+' : '';
    const share = totalAll > 0 ? ((p.current_value||0) / totalAll * 100).toFixed(1) : '0';
    const isin = p.isin || '';
    const link = isin ? `onclick="pywebview.api.open_url('https://www.tbank.ru/invest/bonds/${isin}/')"` : '';
    html += `<tr class="${isin ? 'clickable' : ''}" ${link}>
      <td>${esc(p.name)}</td>
      <td>${TYPE_MAP[p.instrumentType]||p.instrumentType||'—'}</td>
      <td>${p.qty||0}</td>
      <td>${fmtMoney(p.current_price, 2)}</td>
      <td>${fmtMoney(p.current_value)}</td>
      <td class="${cls}">${sign}${fmtMoney(d)}</td>
      <td>${share}%</td>
    </tr>`;
  }
  document.getElementById('posBody').innerHTML = html || '<tr><td colspan="7" class="empty">Нет позиций</td></tr>';
}

// ── Bonds tab ───────────────────────────────────────────────────────────────
function renderBonds(events, bondNkd) {
  let html = '';
  for (const e of events) {
    const d = daysUntil(e.date);
    const dl = daysLabel(d);
    const amt = e.amount || e.amount_est || 0;
    const total = amt * (e.qty || 1);
    const prefix = e.amount_est ? '~ ' : '';
    const isin = e.isin || '';

    let pillCls = 'pill-coupon';
    if (e.type === 'offer' || e.type === 'call') pillCls = 'pill-offer';
    if (e.type === 'maturity') pillCls = 'pill-maturity';
    if (d === 0) pillCls = 'pill-today';

    html += `<tr class="clickable" onclick="pywebview.api.open_url('https://www.tbank.ru/invest/bonds/${isin}/')">
      <td>${esc(e.name)}</td>
      <td>${esc(isin)}</td>
      <td><span class="pill ${pillCls}">${TYPE_LABEL[e.type]||e.type}</span></td>
      <td>${fmtDate(e.date)}${dl ? ' <small style="color:var(--muted)">' + dl + '</small>' : ''}</td>
      <td>${total > 0 ? prefix + fmtMoney(total, 2) : '—'}</td>
    </tr>`;
  }
  document.getElementById('bondBody').innerHTML = html || '<tr><td colspan="5" class="empty">Нет событий</td></tr>';
}

// ── Analytics tab ───────────────────────────────────────────────────────────
function renderAnalytics(positions, ytm, totalNkd, bondAn) {
  // Cards
  document.getElementById('analyticsCards').innerHTML = `
    <div class="card">
      <div class="card-label">НКД накоплено</div>
      <div class="card-value">${totalNkd > 0 ? fmtMoney(totalNkd, 2) : '—'}</div>
    </div>
    <div class="card">
      <div class="card-label">Средний YTM</div>
      <div class="card-value">${ytm != null ? ytm.toFixed(2)+'%' : '—'}</div>
    </div>
    <div class="card">
      <div class="card-label">Позиций</div>
      <div class="card-value">${positions.length}</div>
    </div>
  `;

  // Top movers
  const withDelta = positions.filter(p => p.day_delta != null && p.day_delta !== 0);
  const sorted = [...withDelta].sort((a,b) => b.day_delta - a.day_delta);
  const gainers = sorted.filter(p => p.day_delta > 0).slice(0, 3);
  const losers = sorted.filter(p => p.day_delta < 0).slice(-3).reverse();

  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  html += '<div><div class="section-title" style="margin-top:0">Лучшие</div>';
  for (const p of gainers) {
    html += `<div style="padding:6px 0;display:flex;justify-content:space-between">
      <span>${esc(p.name)}</span><span class="up">+${fmtMoney(p.day_delta)}</span></div>`;
  }
  if (!gainers.length) html += '<div class="empty" style="padding:10px">—</div>';
  html += '</div><div><div class="section-title" style="margin-top:0">Худшие</div>';
  for (const p of losers) {
    html += `<div style="padding:6px 0;display:flex;justify-content:space-between">
      <span>${esc(p.name)}</span><span class="dn">${fmtMoney(p.day_delta)}</span></div>`;
  }
  if (!losers.length) html += '<div class="empty" style="padding:10px">—</div>';
  html += '</div></div>';
  document.getElementById('moversBlock').innerHTML = html;
}

// ── Load data ───────────────────────────────────────────────────────────────
function loadData() {
  pywebview.api.get_data().then(raw => {
    render(JSON.parse(raw));
  }).catch(err => {
    document.querySelector('.tab-content.active').innerHTML =
      '<div class="empty">Ошибка загрузки<br>' + err + '</div>';
  });
}

window.addEventListener('pywebviewready', () => {
  loadData();
  setInterval(loadData, 30000);
});
</script>
</body>
</html>
